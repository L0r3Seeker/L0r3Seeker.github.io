<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛子长度计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 188, 212, 0.15);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #00bcd4;
            font-size: 2.5em;
            margin-bottom: 30px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        input[type="text"]:focus {
            border-color: #00bcd4;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 188, 212, 0.1);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .result-container {
            margin: 30px 0;
            padding: 30px;
            background: linear-gradient(135deg, #00bcd4 0%, #00acc1 100%);
            border-radius: 15px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .result-number {
            font-size: 3em;
            font-weight: 700;
            color: white;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .result-comment {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.6;
            font-weight: 500;
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2em;
        }

        button {
            background: linear-gradient(135deg, #00bcd4 0%, #00acc1 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3);
            flex: 1;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 188, 212, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff5252;
            font-size: 0.9em;
            margin-top: 10px;
            min-height: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 2em;
            }

            .result-number {
                font-size: 2.5em;
            }

            .result-comment {
                font-size: 1em;
            }

            .button-group {
                gap: 10px;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate {
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐂 牛子长度计算器</h1>
        
        <div class="input-group">
            <input 
                type="text" 
                id="username" 
                placeholder="请输入用户名"
                maxlength="20"
            >
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="placeholder-text">等待输入...</div>
        </div>

        <div class="button-group">
            <button onclick="calculate()">🎲 重新计算</button>
            <button onclick="calculate()">🔍 查询</button>
        </div>
    </div>

    <script>
        // 字符串哈希函数 - 将用户名转换为数字种子
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // 转换为32位整数
            }
            return Math.abs(hash);
        }

        // 基于种子的随机数生成器
        function seededRandom(seed) {
            const x = Math.sin(seed) * 10000;
            return x - Math.floor(x);
        }

        // 根据数值获取评论
        function getComment(value) {
            if (value <= 177) {  // 0-177
                return "进化树在你这里长了回头枝";
            } else if (value <= 355) {  // 178-355
                return "《自然》杂志拒绝发表：样本量不足。";
            } else if (value <= 533) {  // 356-533
                return "NASA已发出邀请：我们需要你的天线。";
            } else if (value <= 711) {  // 534-711
                return "三体人发来贺电：地球人终于有拿得出手的东西了";
            } else {  // 712-888
                return "建议捐给国家，用于建造跨海大桥";
            }
        }

        // 计算函数
        function calculate() {
            const username = document.getElementById('username').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            const resultContainer = document.getElementById('resultContainer');

            // 清除错误信息
            errorMessage.textContent = '';

            // 验证用户名
            if (!username) {
                errorMessage.textContent = '⚠️ 请输入用户名';
                return;
            }

            // 生成随机数
            const userHash = hashString(username);
            const timestamp = Date.now();
            const seed = userHash + timestamp;
            const randomValue = Math.floor(seededRandom(seed) * 889); // 0-888

            // 获取评论
            const comment = getComment(randomValue);

            // 更新显示
            resultContainer.classList.remove('animate');
            void resultContainer.offsetWidth; // 触发重排
            resultContainer.classList.add('animate');

            resultContainer.innerHTML = `
                <div class="result-number">${randomValue}
